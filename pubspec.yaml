name: hdoom
description: "A new Flutter project."

publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.1.0
  cached_network_image: ^3.4.1
  get: ^4.7.2
  image_cropper: ^12.2.1
  image_picker: ^1.1.2
  shared_preferences: ^2.5.3
  http: ^1.5.0
  shimmer: ^3.0.0
  permission_handler: ^12.0.3
  pinput: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/
    - assets/language/
  
  fonts:
    - family: Georama
      fonts:
        - asset: assets/fonts/Georama-VariableFont_wdth,wght.ttf
